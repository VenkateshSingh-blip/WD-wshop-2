<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .form-container {
            width: 250px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 5px;
            border: 1px solid #000;
        }

        button {
            padding: 8px 12px;
            margin: 5px 5px 5px 0;
            border: 1px solid #000;
            background-color: #f2f2f2;
            cursor: pointer;
        }

        .buttons {
            margin-top: 10px;
        }

        .card {
            border: 1px solid black;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Employee Management System</h1>

<div class="form-container">
    <input type="text" id="name" placeholder="Employee Name">
    <input type="text" id="empid" placeholder="Employee ID">
    <input type="text" id="branch" placeholder="Branch">
    <input type="number" id="salary" placeholder="Salary">

    <button onclick="addEmployee()">Add Employee</button>
</div>

<div class="buttons">
    <button onclick="showAll()">Show All</button>
    <button onclick="netsalary()">Net Salary</button>
    <button onclick="salaryabove50()">Salary &gt; 50000</button>
    <button onclick="averagesalary()">Average Salary</button>
    <button onclick="countdepartment()">Count by Department</button>
</div>

<!-- Output Areas -->
<div id="display"></div>
<div id="result" style="white-space: pre-wrap; margin-top: 10px;"></div>

<script>
let employees = [];

function addEmployee(){
    let name = document.getElementById("name").value.trim();
    let id = document.getElementById("empid").value.trim();
    let branch = document.getElementById("branch").value.trim();
    let salary = parseFloat(document.getElementById("salary").value);

    if(name === "" || id === "" || branch === "" || isNaN(salary)){
        alert("Please fill all fields!");
        return;
    }

    employees.push({name, id, branch, salary});
    alert("Employee Added!");

    document.getElementById("name").value = "";
    document.getElementById("empid").value = "";
    document.getElementById("branch").value = "";
    document.getElementById("salary").value = "";
}

function showAll(){
    let container = document.getElementById("display");
    container.innerHTML = "";

    if(employees.length === 0){
        container.innerHTML = "No employees added";
        return;
    }

    employees.forEach(emp => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML =
            "<b>Name:</b> " + emp.name + "<br>" +
            "<b>ID:</b> " + emp.id + "<br>" +
            "<b>Branch:</b> " + emp.branch + "<br>" +
            "<b>Salary:</b> " + emp.salary;

        container.appendChild(div);
    });
}

function netsalary(){
    if(employees.length === 0){
        showResult("No employees added");
        return;
    }

    let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
    showResult("Net Salary = " + total);
}

function salaryabove50(){
    let filtered = employees.filter(emp => emp.salary > 50000);

    if(filtered.length === 0){
        showResult("No employee has salary > 50000");
        return;
    }

    let text = "Employees with salary > 50000:\n";

    filtered.forEach(emp => {
        text += emp.name + " : " + emp.salary + "\n";
    });

    showResult(text);
}

function averagesalary(){
    if(employees.length === 0){
        showResult("No employees added");
        return;
    }

    let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
    let avg = (total / employees.length).toFixed(2);

    showResult("Average Salary = " + avg);
}

function countdepartment(){
    if(employees.length === 0){
        showResult("No employees added");
        return;
    }

    let dept = {};

    employees.forEach(emp => {
        dept[emp.branch] = (dept[emp.branch] || 0) + 1;
    });

    let text = "Department Count:\n";

    for(let d in dept){
        text += d + " : " + dept[d] + "\n";
    }

    showResult(text);
}

function showResult(msg){
    document.getElementById("result").innerText = msg;
}
</script>

</body>
</html>
