<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>exp 6</title>
    <style>
         body {
            text-align: center;
            margin-top: 50px;
            background-color:aqua;
        }

        button {
            margin: 5px;
            padding: 10px;
        }

        #container {
            background-color:white;
            border: 2px solid black;
            padding: 20px;
            display: inline-block;
        }
        h2{
    text-align: end;
        }
    </style>

</head>
<body>

    <div id="container">
        <h1 id="heading">welcome to javascript lab</h1>
        <p id="para">This is a paragraph</p>

        <input type="text" id="inputText" placeholder="Enter heading text">

        <br><br>

        <button onclick="changeColor()">Change BG Color</button>
        <button onclick="changeHeading()">Change Heading</button>
        <button onclick="increaseFont()">Increase Font</button>
        <button onclick="togglePara()">Show/Hide Paragraph</button>

        <h2>Venkatesh Singh</h2>
        <h2>2503201001313</h2>
        <h2>cse-26</h2>
    </div>
    <script>
       let colors = ["red", "blue", "green", "yellow", "pink", "orange"];
        let index = 0;

        function changeColor() {
            document.body.style.backgroundColor = colors[index];
            index = (index + 1) % colors.length;
        }

        function changeHeading() {
            let input = document.getElementById("inputText").value;
            document.getElementById("heading").innerText = input;
        }

        function increaseFont() {
            let h1 = document.getElementById("heading");
            let size = window.getComputedStyle(h1).fontSize;
            size = parseInt(size);
            h1.style.fontSize = (size + 5) + "px";
        }

        function togglePara() {
            let para = document.getElementById("para");
            if (para.style.display === "none") {
                para.style.display = "block";
            } else {
                para.style.display = "none";
            }
        } 
    </script>


</body>
</html>
